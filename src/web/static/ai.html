<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantPro — AI助手</title>
<link rel="stylesheet" href="styles.css">
<style>
.chat-layout {
  display: flex; gap: 16px;
  height: calc(100vh - 64px - 48px);
}
.chat-sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--surface-2);
  border: 1px solid var(--border-1);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden;
}
.chat-sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; border-bottom: 1px solid var(--border-1);
  flex-shrink: 0;
}
.chat-sidebar-header span { font-size: 13.5px; font-weight: 600; }
.chat-history-list { flex: 1; overflow-y: auto; }
.chat-history-item {
  padding: 12px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border-1);
  transition: background .15s;
}
.chat-history-item:hover { background: var(--surface-3); }
.chat-history-item.active { background: var(--surface-3); border-left: 2px solid var(--orange); }
.chat-history-item .title {
  font-size: 12.5px; color: var(--text-1); margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-history-item .time { font-size: 11px; color: var(--text-4); }
.chat-item-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.chat-delete-btn {
  opacity: 0; width: 20px; height: 20px; border-radius: 4px;
  background: transparent; border: none; color: var(--text-4);
  cursor: pointer; font-size: 14px; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.chat-history-item:hover .chat-delete-btn { opacity: 1; }
.chat-delete-btn:hover { background: var(--red-10); color: var(--red); }

.chat-main {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border-1);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden;
}
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; height: 56px;
  border-bottom: 1px solid var(--border-1); flex-shrink: 0;
}
.chat-header-title { font-size: 14px; font-weight: 600; }
.chat-header-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 18px;
}
.msg { display: flex; gap: 10px; align-items: flex-start; animation: msgFadeIn .3s ease; }
@keyframes msgFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center; font-size: 12px; font-weight: 700;
}
.msg.ai .msg-avatar {
  background: linear-gradient(135deg, var(--orange), var(--orange-dk));
  color: #fff; box-shadow: 0 0 12px rgba(249,115,22,.25);
}
.msg.user .msg-avatar { background: var(--surface-4); color: var(--text-2); }
.msg-body { display: flex; flex-direction: column; gap: 4px; max-width: 68%; }
.msg.user .msg-body { align-items: flex-end; }
.msg-bubble {
  padding: 12px 16px; border-radius: 12px;
  font-size: 13px; line-height: 1.65;
}
.msg.ai .msg-bubble {
  background: var(--surface-3); color: var(--text-1);
  border: 1px solid var(--border-1);
  border-top-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: var(--orange-10); color: var(--text-1);
  border: 1px solid rgba(249,115,22,.15);
  border-top-right-radius: 4px;
}
.msg-time { font-size: 10.5px; color: var(--text-4); padding: 0 4px; }
.msg-actions {
  display: flex; gap: 6px; margin-top: 4px; opacity: 0; transition: opacity .2s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  padding: 4px 8px; font-size: 11px; border-radius: 4px;
  background: var(--surface-2); border: 1px solid var(--border-2);
  color: var(--text-3); cursor: pointer; transition: all .15s;
}
.msg-action-btn:hover { background: var(--surface-3); color: var(--text-1); }

.trade-popup {
  position: fixed;
  right: 24px;
  top: 80px;
  background: var(--surface-2);
  border: 1px solid var(--border-1);
  border-radius: 12px;
  padding: 14px 16px;
  min-width: 260px;
  z-index: 2000;
  box-shadow: 0 12px 30px rgba(0,0,0,.25);
  animation: tradePopIn .25s ease;
}
@keyframes tradePopIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.trade-popup.buy { border-color: rgba(34,197,94,.4); }
.trade-popup.sell { border-color: rgba(239,68,68,.4); }
.trade-popup.failed { border-color: rgba(239,68,68,.7); }
.trade-popup.skipped { border-color: rgba(148,163,184,.6); }
.trade-popup-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.trade-popup-meta { font-size: 12px; color: var(--text-3); line-height: 1.6; }

.quick-prompts {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 14px 24px 0; flex-shrink: 0;
}
.quick-prompt {
  padding: 6px 14px; border-radius: 100px;
  background: var(--surface-1); border: 1px solid var(--border-2);
  color: var(--text-3); font-size: 12px; cursor: pointer;
  transition: all .2s ease;
  display: flex; align-items: center; gap: 6px;
}
.quick-prompt:hover {
  border-color: var(--orange); color: var(--orange);
  background: var(--orange-10);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(249,115,22,.15);
}
.quick-prompt.highlight {
  background: var(--orange-10); border-color: var(--orange);
  color: var(--orange);
}

.chat-input-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-top: 1px solid var(--border-1);
  flex-shrink: 0;
}
.chat-input {
  flex: 1; height: 42px; padding: 0 16px;
  background: var(--surface-3); border: 1px solid var(--border-2);
  border-radius: 10px; color: var(--text-1); font-size: 13px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.chat-input:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(249,115,22,.08);
}
.chat-input::placeholder { color: var(--text-4); }

.filter-btn.active {
  background: var(--orange-10) !important;
  color: var(--orange) !important;
  border-color: rgba(249,115,22,.2) !important;
}

/* AI 打字中动画 */
.typing-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background-color: var(--text-3);
  margin-right: 4px;
  animation: typing 1.4s infinite ease-in-out both;
}

.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

@keyframes typing {
  0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

.ai-reasoning {
  transition: all 0.3s ease;
}

.user-data-status {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 100px;
  background: var(--surface-3); font-size: 11px;
  color: var(--text-3); cursor: pointer;
  transition: all .2s;
}
.user-data-status:hover { background: var(--surface-4); }
.user-data-status.connected { color: var(--green); }
.user-data-status .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-4);
}
.user-data-status.connected .dot { background: var(--green); }

.welcome-card {
  background: linear-gradient(135deg, var(--surface-3), var(--surface-2));
  border: 1px solid var(--border-1); border-radius: 12px;
  padding: 24px; margin: 20px 0;
  text-align: center;
}
.welcome-card h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 8px;
  background: linear-gradient(135deg, var(--orange), #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.welcome-card p { font-size: 13px; color: var(--text-3); line-height: 1.6; }

.feature-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-top: 16px;
}
.feature-item {
  padding: 12px; background: var(--surface-1);
  border: 1px solid var(--border-2); border-radius: 8px;
  cursor: pointer; transition: all .2s;
}
.feature-item:hover {
  border-color: var(--orange); transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
.feature-item .icon { font-size: 20px; margin-bottom: 6px; }
.feature-item .title { font-size: 12px; font-weight: 600; color: var(--text-1); }
.feature-item .desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
</style>
</head>

<script src="js/config.js"></script>

<main class="page" style="padding-bottom:0;height:calc(100vh - 64px)">
  <div class="chat-layout">
    <!-- 侧边栏 -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">
        <span>对话历史</span>
        <button class="btn btn-primary btn-sm" id="newChatBtn">+ 新建</button>
      </div>
      <div class="chat-history-list" id="chatHistoryList">
        <div style="text-align:center;padding:30px;color:var(--text-4)">
          <div class="loading-spinner" style="width:24px;height:24px;margin:0 auto 10px"></div>
          <div>加载对话历史...</div>
        </div>
      </div>
    </div>

    <!-- 主聊天区 -->
    <div class="chat-main">
      <div class="chat-header">
        <div>
          <div class="chat-header-title">QuantPro AI 助手</div>
          <div class="chat-header-sub">基于 DeepSeek · 专注 A股量化投资</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="user-data-status connected" id="userDataStatus" onclick="handleMyData()">
            <span class="dot"></span>
            <span>已连接用户数据</span>
          </div>

        </div>

      <div class="chat-messages" id="chatMessages">
        <div class="msg ai">
          <div class="msg-avatar">Q</div>
          <div class="msg-body">
            <div class="msg-bubble">
              <div class="welcome-card">
                <h3>欢迎使用 QuantPro AI 助手</h3>
                <p>我已获取您的投资数据，可以为您提供个性化的分析和建议</p>
                <div class="feature-grid">
                  <div class="feature-item" onclick="sendMessage('分析我的持仓结构，给出优化建议')">
                    <div class="icon">分析</div>

                    <div class="desc">分析持仓结构</div>
                  </div>
                  <div class="feature-item" onclick="sendMessage('评估我的投资风险，给出风控建议')">
                    <div class="icon">警告</div>
                    <div class="title">风险评估</div>
                    <div class="desc">评估投资风险</div>
                  </div>
                  <div class="feature-item" onclick="sendMessage('根据我的持仓和市场情况，推荐一些适合的股票')">
                    <div class="icon">目标</div>
                    <div class="title">智能选股</div>
                    <div class="desc">个性化推荐</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="msg-time">刚刚</div>
          </div>
        </div>
      </div>

      <div class="quick-prompts" id="quickPrompts">
        <button class="quick-prompt" data-action="comprehensive">综合分析</button>
        <button class="quick-prompt" data-action="position">持仓分析</button>
        <button class="quick-prompt" data-action="risk">风险评估</button>
        <button class="quick-prompt" data-action="analyze">分析我的持仓</button>
        <button class="quick-prompt" data-action="pick">AI联网智能选股</button>
        <button class="quick-prompt" data-action="auto_trade">模型自动交易</button>
        <button class="quick-prompt" data-action="report">生成投资周报</button>
        <button class="quick-prompt" data-action="factor">推荐量化选股因子</button>
        <button class="quick-prompt" data-action="mydata">查看我的数据</button>
      </div>

      <div class="chat-input-bar">
        <input class="chat-input" id="chatInput" placeholder="输入问题，例如：如何优化布林带策略参数..." />
        <button class="btn btn-primary" id="sendBtn" style="height:42px;padding:0 20px">发送</button>
      </div>
    </div>

<script>
const API_BASE = CONFIG.API_BASE_URL;
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const quickPrompts = document.querySelectorAll('.quick-prompt');
const historyList = document.querySelector('.chat-history-list');

let history = [];
let sending = false;
let currentSessionId = null;

// ── 删除聊天历史 ────────────────────────────────────────
async function deleteChat(e, id) {
  e.stopPropagation();
  e.preventDefault();
  
  if (!confirm('确定要删除这个对话吗？')) return;
  
  const item = document.querySelector(`.chat-history-item[data-id="${id}"]`);
  
  try {
    const data = await safeFetch(`${API_BASE}/api/chat/sessions/${id}`, {
      method: 'DELETE'
    });
    
    if (data && data.success) {
      if (item) {
        item.style.transition = 'all .2s';
        item.style.opacity = '0';
        item.style.transform = 'translateX(-20px)';
        setTimeout(() => item.remove(), 200);
      }
      
      if (currentSessionId === id) {
        currentSessionId = null;
        history = [];
        chatMessages.innerHTML = '';
        appendMsg('ai', '对话已删除，请开始新的对话。');
      }
    } else {
      alert('删除失败: ' + (data.error || '未知错误'));
    }
  } catch (err) {
    console.error('删除会话失败:', err);
    Utils.showToast('删除失败，请检查网络连接后重试', 'error');
  }
}

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'ai' ? 'Q' : '我';
  
  let actionsHtml = '';
  if (role === 'ai') {
    actionsHtml = `
      <div class="msg-actions">
        <button class="msg-action-btn" onclick="copyMessage(this)">复制</button>
        <button class="msg-action-btn" onclick="regenerateMessage()">重新生成</button>
      </div>`;
  }
  
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${now()}</div>
      ${actionsHtml}
    </div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function copyMessage(btn) {
  const bubble = btn.closest('.msg-body').querySelector('.msg-bubble');
  const text = bubble.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

function regenerateMessage() {
  if (history.length >= 2) {
    const lastUserMsg = history.filter(m => m.role === 'user').pop();
    if (lastUserMsg) {
      history = history.slice(0, -1);
      sendMessage(lastUserMsg.content);
    }
  }
}

function appendTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar">Q</div>
    <div class="msg-body">
      <div class="msg-bubble" style="padding:14px 18px">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

// ── 对话历史 ──────────────────────────────────────────
async function loadSessions() {
  const historyList = document.getElementById('chatHistoryList');
  try {
    const url = `${API_BASE}/api/chat/sessions`;
    const data = await safeFetch(url);
    
    if (!data || !data.success) {
      historyList.innerHTML = `
        <div style="text-align:center;padding:30px;color:var(--text-4)">
          <div>暂无对话历史</div>
          <div style="font-size:12px;margin-top:5px">开始新对话</div>
        </div>
      `;
      return;
    }
    historyList.innerHTML = '';
    data.data.forEach(s => {
      const div = document.createElement('div');
      div.className = 'chat-history-item' + (s.id === currentSessionId ? ' active' : '');
      div.dataset.id = s.id;
      div.innerHTML = `
        <div class="chat-item-row">
          <div style="flex:1;min-width:0">
            <div class="title" title="${s.title.replace(/"/g, '&quot;')}">${s.title}</div>
            <div class="time">${s.updated_at.slice(0,16)}</div>
          </div>
          <button class="chat-delete-btn" onclick="deleteChat(event, ${s.id})" title="删除对话">✕</button>
        </div>`;
      div.addEventListener('click', () => loadSession(s.id));
      historyList.appendChild(div);
    });
  } catch {
    historyList.innerHTML = `
      <div style="text-align:center;padding:30px;color:var(--text-4)">
        <div>加载失败</div>
        <div style="font-size:12px;margin-top:5px">请检查网络连接</div>
      </div>
    `;
  }
}

async function loadSession(sid) {
  currentSessionId = sid;
  history = [];
  chatMessages.innerHTML = '';
  document.querySelectorAll('.chat-history-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === sid);
  });
  try {
    const data = await safeFetch(`${API_BASE}/api/chat/sessions/${sid}/messages`);
    if (!data || !data.success) return;
    data.data.forEach(m => {
      const role = m.role === 'user' ? 'user' : 'ai';
      appendMsg(role, m.content.replace(/\n/g, '<br>'));
      history.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content });
    });
  } catch {}
}

async function createSession(title) {
  const data = await safeFetch(`${API_BASE}/api/chat/sessions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title })
  });
  return data && data.success && data.data ? data.data.id : null;
}

async function saveMessage(role, content) {
  if (!currentSessionId) return;
  await safeFetch(`${API_BASE}/api/chat/sessions/${currentSessionId}/messages`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role, content })
  });
}

// ── 发送消息 ──────────────────────────────────────────
async function sendMessage(text, includeUserData = true) {
  text = text.trim();
  if (!text || sending) return;
  sending = true;
  chatInput.value = '';

  // 首条消息时自动建立 session
  if (!currentSessionId) {
    const title = text.length > 20 ? text.slice(0, 20) + '…' : text;
    currentSessionId = await createSession(title);
    await loadSessions();
  }

  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  await saveMessage('user', text);

  const typing = appendTyping();
  try {
    // 增加超时控制：AI 对话可能需要较长时间（尤其是推理模型），设置 60s 超时
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), CONFIG.AI_API_TIMEOUT || 60000);

    const res = await fetch(`${API_BASE}/api/ai/chat/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({ 
        messages: history,
        include_user_data: includeUserData
      })
    });
    
    clearTimeout(timeoutId);

    if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = '';
    let firstChunkReceived = false;
    let bubble = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      // 收到第一个数据块时，移除 loading 指示器并创建消息框
      if (!firstChunkReceived) {
        typing.remove();
        bubble = appendMsg('ai', '');
        firstChunkReceived = true;
      }

      const lines = decoder.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const obj = JSON.parse(payload);
          if (obj.error) { bubble.innerHTML = '错误：' + obj.error; break; }
          
          if (obj.is_reasoning) {
            // 处理思维链内容
            if (!bubble.querySelector('.ai-reasoning')) {
              bubble.innerHTML = '<div class="ai-reasoning" style="color:var(--text-4);font-style:italic;font-size:12px;margin-bottom:8px;padding:8px;background:var(--surface-1);border-radius:4px;border-left:2px solid var(--border-2)">正在思考...<br></div>';
            }
            const rBox = bubble.querySelector('.ai-reasoning');
            rBox.innerHTML += obj.content.replace(/\n/g, '<br>');
          } else if (obj.content) {
            // 处理正式内容
            fullReply += obj.content;
            
            // 如果之前有思维链，保留它，在其后添加内容
            const rBox = bubble.querySelector('.ai-reasoning');
            if (rBox) {
              // 第一次收到正式内容时，可以把思考过程收起或淡化
              if (rBox.innerHTML.includes('正在思考...')) {
                rBox.innerHTML = rBox.innerHTML.replace('正在思考...', '思考过程：');
                rBox.style.opacity = '0.7';
              }
              const contentDiv = bubble.querySelector('.ai-content') || document.createElement('div');
              if (!contentDiv.className) {
                contentDiv.className = 'ai-content';
                bubble.appendChild(contentDiv);
              }
              contentDiv.innerHTML = fullReply.replace(/\n/g, '<br>');
            } else {
              bubble.innerHTML = fullReply.replace(/\n/g, '<br>');
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        } catch (err) {
          console.error('解析消息失败:', err);
        }
      }
    }
    history.push({ role: 'assistant', content: fullReply });
    await saveMessage('assistant', fullReply);
  } catch (e) {
    typing.remove();
    appendMsg('ai', '连接后端失败，请确认后端服务已启动（python app.py）。');
  } finally {
    sending = false;
  }
}

// ── 渲染交易信号 ──────────────────────────────────────────────────────────
function renderTradeSignals(signals) {
  let html = `<div style="margin-top:12px"><strong>交易信号</strong><br>`;
  html += `<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">`;
  
  signals.forEach((s, i) => {
    const isBuy = s.action === 'buy';
    const bgColor = isBuy ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)';
    const borderColor = isBuy ? 'rgba(34,197,94,.3)' : 'rgba(239,68,68,.3)';
    const textColor = isBuy ? 'var(--green)' : 'var(--red)';
    const actionText = isBuy ? '买入' : '卖出';
    
    html += `<div class="signal-card" data-index="${i}" style="padding:12px;background:${bgColor};border-radius:10px;border:1px solid ${borderColor}">`;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
    html += `<span><strong>${s.name}</strong> <span style="color:var(--text-4);font-size:11px">${s.code}</span></span>`;
    html += `<span style="background:${textColor};color:#fff;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600">${actionText}</span>`;
    html += `</div>`;
    html += `<div style="font-size:12px;color:var(--text-3);margin-bottom:8px">${s.reason}</div>`;
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap">`;
    html += `<span style="font-size:11px;color:var(--text-4)">建议价格: ¥${s.price}</span>`;
    html += `<span style="font-size:11px;color:var(--text-4)">数量: ${s.shares}股</span>`;
    html += `<span style="font-size:11px;color:var(--text-4)">置信度: ${s.confidence}%</span>`;
    html += `</div>`;
    html += `<button class="execute-signal-btn" data-signal-index="${i}" style="margin-top:10px;width:100%;padding:8px;border-radius:6px;border:none;background:${textColor};color:#fff;cursor:pointer;font-weight:600;font-size:12px;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">一键执行</button>`;
    html += `</div>`;
  });
  
  html += `</div></div>`;
  return html;
}

// ── 绑定交易信号按钮事件 ──────────────────────────────────────────────────
function attachSignalHandlers(bubble, signals) {
  const buttons = bubble.querySelectorAll('.execute-signal-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', async function() {
      const idx = parseInt(this.dataset.signalIndex);
      const signal = signals[idx];
      
      if (!signal) return;
      
      this.textContent = '执行中...';
      this.disabled = true;
      
      try {
        const endpoint = signal.action === 'buy' ? '/api/mock/buy' : '/api/mock/sell';
        const result = await safeFetch(`${API_BASE}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: signal.code,
            name: signal.name,
            price: signal.price,
            amount: signal.shares
          })
        });
        
        if (result && result.success) {
          this.textContent = '✓ 已执行';
          this.style.background = 'var(--green)';
        } else {
          this.textContent = '执行失败: ' + (result.error || '未知错误');
          this.style.background = 'var(--red)';
        }
      } catch (e) {
        this.textContent = '执行失败';
        this.style.background = 'var(--red)';
      }
    });
  });
}

const tradePopupStack = [];
function updateTradePopupPositions() {
  tradePopupStack.forEach((el, idx) => {
    el.style.top = `${80 + idx * 92}px`;
  });
}
function showTradePopup(info, duration = 4500) {
  const action = String(info.action || '').toUpperCase();
  const status = info.status || 'executed';
  const name = info.name || info.code || '';
  const code = info.code || '';
  const price = info.price ? `¥${Number(info.price).toFixed(2)}` : 'N/A';
  const amount = info.amount ? `${info.amount}股` : 'N/A';
  const reason = info.reason || info.error || info.status || '';
  const actionText = action === 'BUY' ? '买入' : action === 'SELL' ? '卖出' : action || '交易';
  const el = document.createElement('div');
  el.className = `trade-popup ${action === 'BUY' ? 'buy' : action === 'SELL' ? 'sell' : ''} ${status}`;
  el.innerHTML = `
    <div class="trade-popup-title">${actionText} ${name} <span style="color:var(--text-4);font-size:11px">${code}</span></div>
    <div class="trade-popup-meta">价格: ${price} · 数量: ${amount}</div>
    <div class="trade-popup-meta">状态: ${status} ${reason ? '· ' + reason : ''}</div>
  `;
  document.body.appendChild(el);
  tradePopupStack.push(el);
  updateTradePopupPositions();
  setTimeout(() => {
    const idx = tradePopupStack.indexOf(el);
    if (idx >= 0) tradePopupStack.splice(idx, 1);
    el.remove();
    updateTradePopupPositions();
  }, duration);
}

          reply += `<div style="padding:10px;background:var(--surface-1);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--orange)">`;
          reply += `<div style="display:flex;justify-content:space-between;align-items:center">`;
          reply += `<span><strong>${s.name}</strong> <span style="color:var(--text-4);font-size:11px">${s.code}</span></span>`;
          reply += `<span style="background:linear-gradient(135deg,var(--orange),#f59e0b);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px">${s.score}分</span>`;
          reply += `</div>`;
          reply += `<div style="font-size:12px;color:var(--text-3);margin-top:6px">${s.reason}</div>`;
          reply += `</div>`;
        });
        
        const bubble = appendMsg('ai', reply);
      } else {
        appendMsg('ai', '选股服务暂时不可用，请稍后再试。');
      }
    } catch (e) {
      typing.remove();
      appendMsg('ai', '联网选股失败，请检查后端服务是否正常运行。');
    }
  });
}

async function handleModelAutoTrade() {
  appendMsg('user', '模型自动交易');
  const typing = appendTyping();
  try {
    const result = await safeFetch(`${API_BASE}/api/ai/select_stocks_v2`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        top_n: 3,
        analyze_with_ai: false,
        analyze_with_agents: true,
        include_kronos: false,
        include_quote: true,
        auto_trade: true,
        min_confidence: 0,
        max_trades: 3
      })
    });
    typing.remove();
    if (result && result.success) {
      const actions = result.data?.trade_actions || [];
      if (actions.length > 0) {
        actions.forEach(a => showTradePopup(a, 5000));
        appendMsg('ai', `已触发 ${actions.length} 笔模型交易，弹窗已展示。`);
      } else {
        appendMsg('ai', '本次没有触发可执行交易。');
      }
    } else {
      appendMsg('ai', result?.error || '模型交易失败，请稍后再试。');
    }
  } catch (e) {
    typing.remove();
    appendMsg('ai', '连接后端失败，请确认后端服务已启动。');
  }
}

// ── 生成投资周报 ──────────────────────────────────────────────────────────
async function handleWeeklyReport() {
  appendMsg('user', '生成投资周报');
  
  const userData = await getUserData();
  const typing = appendTyping();
  
  // 构建周报请求
  const account = userData.account || {};
  const positions = account.positions || [];
  const history = userData.history || [];
  
  const prompt = `请根据以下数据生成本周投资周报：

【账户概况】
- 初始资金: ¥${(account.initial_capital || 1000000).toLocaleString()}
- 当前总资产: ¥${(account.total_asset || 1000000).toLocaleString()}
- 可用资金: ¥${(account.available_cash || 0).toLocaleString()}
- 收益率: ${(((account.total_asset || 1000000) / (account.initial_capital || 1000000) - 1) * 100).toFixed(2)}%

【当前持仓】
${positions.length > 0 ? positions.map(p => `- ${p.name}(${p.code}): ${p.shares}股, 成本${p.cost_price}元`).join('\n') : '暂无持仓'}

【近期交易】
${history.length > 0 ? history.slice(0, 10).map(h => `- ${h.time} ${h.action === 'buy' ? '买入' : '卖出'} ${h.name} ${h.qty}股@${h.price}元`).join('\n') : '暂无交易记录'}

请生成一份专业的投资周报，包括：
1. 本周市场回顾
2. 持仓分析
3. 交易总结
4. 下周操作建议`;
  
  try {
    const result = await safeFetch(`${API_BASE}/api/ai/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        messages: [{ role: 'user', content: prompt }]
      })
    });
    
    typing.remove();
    
    if (result && result.success) {
      appendMsg('ai', result.reply.replace(/\n/g, '<br>'));
    } else {
      appendMsg('ai', '周报生成失败，请稍后再试。');
    }
  } catch (e) {
    typing.remove();
    appendMsg('ai', '连接后端失败，请确认后端服务已启动。');
  }
}
